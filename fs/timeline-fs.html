<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Kerja Fieldstaff 2026 - Reforma Agraria</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Inter"', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6', // Teal 500
                            600: '#0d9488',
                            700: '#0f766e',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f8fafc; }
        
        /* Hide scrollbar for clean UI but allow scrolling */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Calendar Cell Transitions */
        .calendar-cell { transition: all 0.2s ease; }
        .task-pill { transition: all 0.2s ease; }
        
        .task-pill.completed {
            opacity: 0.6;
            background-color: #e2e8f0 !important;
            color: #64748b !important;
            border-color: #cbd5e1 !important;
        }

        /* Celebration Animation */
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col overflow-hidden relative">

    <!-- Mobile Backdrop (Dimmed Background for Popup) -->
    <div id="mobile-backdrop" class="fixed inset-0 bg-slate-900/50 z-40 hidden lg:hidden transition-opacity duration-300 opacity-0 backdrop-blur-sm" onclick="closeMobileModal()"></div>

    <!-- Navbar / Header -->
    <header class="bg-white border-b border-slate-200 px-4 sm:px-6 py-4 flex flex-col sm:flex-row items-center justify-between z-20 shadow-sm shrink-0 gap-4">
        <div class="flex items-center gap-3 text-center sm:text-left">
            <div class="w-10 h-10 bg-brand-100 text-brand-600 rounded-xl flex items-center justify-center text-xl shrink-0">
                <i class="fa-solid fa-calendar-days"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg sm:text-xl text-slate-900 leading-tight">Kalender Fieldstaff 2026</h1>
                <p class="text-[10px] sm:text-xs text-slate-500 font-medium">Penanganan Akses Reforma Agraria</p>
            </div>
        </div>

        <!-- Global Progress -->
        <div class="flex items-center gap-4 bg-slate-50 px-4 py-2 rounded-full border border-slate-200 w-full sm:w-auto justify-between sm:justify-start">
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Progres Total</span>
                <span class="text-sm font-bold text-slate-800" id="progress-text">0% (0/11)</span>
            </div>
            <div class="w-24 sm:w-32 h-2 bg-slate-200 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-brand-500 rounded-full transition-all duration-500" style="width: 0%;"></div>
            </div>
            <i class="fa-solid fa-trophy text-slate-300 transition-colors duration-500" id="trophy-icon"></i>
        </div>
    </header>

    <!-- Main Layout (Calendar + Sidebar/Modal) -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden bg-slate-50 relative">
        
        <!-- LEFT: Calendar Area -->
        <section class="flex-1 flex flex-col h-full lg:border-r border-slate-200 bg-white">
            <!-- Calendar Controls -->
            <div class="px-4 sm:px-6 py-4 flex items-center justify-between border-b border-slate-100 shrink-0">
                <button onclick="changeMonth(-1)" id="btn-prev" class="w-10 h-10 rounded-full hover:bg-slate-100 text-slate-600 transition-colors disabled:opacity-30 flex items-center justify-center">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h2 class="text-lg sm:text-xl font-bold text-slate-800" id="month-year-display">April 2026</h2>
                <button onclick="changeMonth(1)" id="btn-next" class="w-10 h-10 rounded-full hover:bg-slate-100 text-slate-600 transition-colors disabled:opacity-30 flex items-center justify-center">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>

            <!-- Calendar Grid -->
            <div class="flex-1 flex flex-col p-2 sm:p-4 overflow-y-auto no-scrollbar relative">
                <!-- Days of week header -->
                <div class="grid grid-cols-7 gap-1 mb-2 text-center shrink-0">
                    <div class="text-[10px] sm:text-xs font-bold text-rose-500 py-2">Min</div>
                    <div class="text-[10px] sm:text-xs font-bold text-slate-500 py-2">Sen</div>
                    <div class="text-[10px] sm:text-xs font-bold text-slate-500 py-2">Sel</div>
                    <div class="text-[10px] sm:text-xs font-bold text-slate-500 py-2">Rab</div>
                    <div class="text-[10px] sm:text-xs font-bold text-slate-500 py-2">Kam</div>
                    <div class="text-[10px] sm:text-xs font-bold text-slate-500 py-2">Jum</div>
                    <div class="text-[10px] sm:text-xs font-bold text-slate-500 py-2">Sab</div>
                </div>

                <!-- Calendar Cells Container -->
                <div id="calendar-body" class="grid grid-cols-7 gap-1 flex-1 auto-rows-fr">
                    <!-- JavaScript will populate this -->
                </div>
            </div>
        </section>

        <!-- RIGHT (Desktop Sidebar) / BOTTOM (Mobile Pop-up Modal) -->
        <aside id="task-sidebar" class="fixed inset-x-0 bottom-0 z-50 w-full h-[85vh] bg-slate-50 rounded-t-3xl shadow-[0_-20px_40px_rgba(0,0,0,0.15)] transform translate-y-full transition-transform duration-300 ease-in-out lg:static lg:translate-y-0 lg:h-full lg:rounded-none lg:w-[400px] xl:w-[450px] lg:border-l lg:border-slate-200 shrink-0 lg:shadow-inner overflow-hidden flex flex-col">
            
            <!-- Mobile Drag Handle & Close Button -->
            <div class="lg:hidden relative w-full pt-4 pb-2 flex justify-center bg-white rounded-t-3xl border-b border-slate-100 shrink-0">
                <div class="w-12 h-1.5 bg-slate-300 rounded-full"></div>
                <button onclick="closeMobileModal()" class="absolute right-4 top-3 w-8 h-8 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center hover:bg-slate-200">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- Default Empty State (Only visible on Desktop) -->
            <div id="empty-state" class="hidden lg:flex flex-col items-center justify-center h-full p-8 text-center text-slate-400 absolute inset-0 transition-opacity">
                <i class="fa-regular fa-hand-pointer text-5xl mb-4 text-slate-300"></i>
                <h3 class="text-lg font-bold text-slate-600 mb-2">Pilih Tanggal Kegiatan</h3>
                <p class="text-sm">Klik blok warna pada kalender untuk melihat instruksi lengkap dan menandai progres pekerjaan.</p>
            </div>

            <!-- Task Detail View -->
            <div id="task-detail" class="hidden flex-col h-full overflow-y-auto no-scrollbar p-5 sm:p-6 bg-slate-50 lg:bg-transparent animate-pop">
                <div class="mb-5 sm:mb-6 shrink-0">
                    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-[10px] sm:text-xs font-bold mb-3 sm:mb-4 shadow-sm" id="detail-badge">
                        <!-- Filled by JS -->
                    </div>
                    <h2 class="text-xl sm:text-2xl font-bold text-slate-900 mb-2 leading-tight" id="detail-title">Judul Tugas</h2>
                    <p class="text-xs sm:text-sm text-slate-500 flex items-center gap-2 font-medium">
                        <i class="fa-regular fa-clock"></i>
                        <span id="detail-date">01 - 15 April 2026</span>
                    </p>
                </div>

                <div class="bg-white rounded-2xl p-4 sm:p-5 shadow-sm border border-slate-200 mb-6 shrink-0">
                    <h4 class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Instruksi Kerja</h4>
                    <ul id="detail-list" class="space-y-3 text-xs sm:text-sm text-slate-700 leading-relaxed">
                        <!-- Filled by JS -->
                    </ul>
                </div>

                <!-- Action Button -->
                <div class="mt-auto pt-4 sm:pt-6 pb-6 lg:pb-0 shrink-0">
                    <button id="btn-complete" onclick="toggleCurrentTask()" class="w-full py-3.5 sm:py-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all shadow-sm">
                        <!-- Content dynamic via JS -->
                    </button>
                </div>
            </div>
        </aside>
    </main>

    <!-- App Logic -->
    <script>
        // Data Structure based on the Juknis
        const tasks = [
            { 
                id: 1, month: 3, start: 1, end: 15, // April (0-indexed)
                title: "Persiapan & Modul", 
                category: "Persiapan",
                theme: { bg: "bg-blue-100", border: "border-blue-400", text: "text-blue-700", badge: "bg-blue-100 text-blue-700" },
                details: [
                    "Koordinasi internal dengan Seksi Penataan dan Pemberdayaan.",
                    "Membantu menyiapkan list lokasi redistribusi dan legalisasi aset sebagai target pemetaan sosial.",
                    "Menyiapkan bahan paparan/modul penyuluhan dan draf undangan untuk perangkat desa/masyarakat."
                ],
                completed: false
            },
            { 
                id: 2, month: 3, start: 16, end: 16, 
                title: "Pelaksanaan Penyuluhan (FIX)", 
                category: "Aksi",
                theme: { bg: "bg-amber-100", border: "border-amber-400", text: "text-amber-800", badge: "bg-amber-100 text-amber-700" },
                details: [
                    "Melakukan perjalanan dinas ke lokasi sasaran.",
                    "Membantu narasumber saat pelaksanaan penyuluhan.",
                    "Memastikan daftar hadir serta notula rapat terdokumentasi dengan baik."
                ],
                completed: false
            },
            { 
                id: 3, month: 3, start: 17, end: 30, 
                title: "Data Sekunder & Peta", 
                category: "Persiapan",
                theme: { bg: "bg-indigo-100", border: "border-indigo-400", text: "text-indigo-700", badge: "bg-indigo-100 text-indigo-700" },
                details: [
                    "Mengumpulkan data sekunder (Monografi/Demografi Desa) dari kantor desa.",
                    "Menyiapkan peta kerja (data spasial/tekstual) untuk persiapan turun lapangan."
                ],
                completed: false
            },
            { 
                id: 4, month: 4, start: 1, end: 31, // May
                title: "Pemetaan Sosial (Pemsos)", 
                category: "Lapangan",
                theme: { bg: "bg-brand-100", border: "border-brand-500", text: "text-brand-800", badge: "bg-brand-100 text-brand-700" },
                details: [
                    "Melaksanakan Pemetaan Sosial melalui interview (wawancara) langsung ke rumah-rumah subjek (Kepala Keluarga) menggunakan kuesioner.",
                    "Melakukan Tagging Lokasi (Mandatory) pada bidang tanah objek pemberdayaan di aplikasi PTM (bisa menggunakan NIB, koordinat, atau kursor).",
                    "Input data harian hasil wawancara ke instrumen berbasis aplikasi/mobile agar progres terpantau."
                ],
                completed: false
            },
            { 
                id: 5, month: 5, start: 1, end: 15, // June
                title: "Penyelesaian Wawancara", 
                category: "Lapangan",
                theme: { bg: "bg-emerald-100", border: "border-emerald-400", text: "text-emerald-800", badge: "bg-emerald-100 text-emerald-700" },
                details: [
                    "Melanjutkan sisa wawancara lapangan.",
                    "Memastikan seluruh target subjek dalam DIPA terpenuhi secara keseluruhan."
                ],
                completed: false
            },
            { 
                id: 6, month: 5, start: 16, end: 30, 
                title: "Entry Data & Tabulasi", 
                category: "Digitalisasi",
                theme: { bg: "bg-purple-100", border: "border-purple-400", text: "text-purple-700", badge: "bg-purple-100 text-purple-700" },
                details: [
                    "Melakukan Entry Data ke Aplikasi PTM (Pemberdayaan Tanah Masyarakat). Ingat, pemetaan sosial belum dianggap selesai jika data belum masuk ke Aplikasi PTM.",
                    "Melakukan tabulasi data hasil pemetaan sosial sesuai template excel yang disediakan."
                ],
                completed: false
            },
            { 
                id: 7, month: 6, start: 1, end: 15, // July
                title: "Analisis Data", 
                category: "Analisis",
                theme: { bg: "bg-rose-100", border: "border-rose-400", text: "text-rose-700", badge: "bg-rose-100 text-rose-700" },
                details: [
                    "Melakukan Analisis Data (mengolah data dalam bentuk tabel, gambar, atau grafik) yang mencakup pendapatan awal, sektor usaha, dan hambatan masyarakat.",
                    "Menyusun Laporan Pemetaan Sosial secara lengkap."
                ],
                completed: false
            },
            { 
                id: 8, month: 6, start: 16, end: 31, 
                title: "Rekomendasi Model", 
                category: "Analisis",
                theme: { bg: "bg-pink-100", border: "border-pink-400", text: "text-pink-700", badge: "bg-pink-100 text-pink-700" },
                details: [
                    "Membantu penyusunan draf Rekomendasi Model Akses (seperti Model Closed Loop, Pertanian Terintegrasi, dll.) melalui metode sarasehan atau diskusi.",
                    "Menyusun Berita Acara Penyusunan Rekomendasi Model bersama petugas Kantor Pertanahan."
                ],
                completed: false
            },
            { 
                id: 9, month: 7, start: 1, end: 15, // August
                title: "Ekspose & Perencanaan", 
                category: "Finalisasi",
                theme: { bg: "bg-orange-100", border: "border-orange-400", text: "text-orange-800", badge: "bg-orange-100 text-orange-700" },
                details: [
                    "Membantu pelaksanaan Ekspose Data dan Perencanaan Kerja Sama melalui rapat dengan GTRA, Pemerintah Daerah, dan calon offtaker.",
                    "Membantu menyusun Berita Acara Perencanaan Kerja Sama sebagai panduan intervensi bantuan."
                ],
                completed: false
            },
            { 
                id: 10, month: 7, start: 16, end: 25, 
                title: "Laporan & Infografis", 
                category: "Pelaporan",
                theme: { bg: "bg-slate-200", border: "border-slate-400", text: "text-slate-800", badge: "bg-slate-200 text-slate-700" },
                details: [
                    "Penyusunan Laporan Akhir Kegiatan yang memuat seluruh tahapan, hasil, dan dokumentasi.",
                    "Pembuatan Infografis kegiatan (resolusi tinggi) sebagai bagian dari diseminasi informasi."
                ],
                completed: false
            },
            { 
                id: 11, month: 7, start: 26, end: 31, 
                title: "Penyerahan Laporan", 
                category: "Pelaporan",
                theme: { bg: "bg-slate-800", border: "border-slate-600", text: "text-white", badge: "bg-slate-700 text-white" },
                details: [
                    "Menyerahkan seluruh berkas (Laporan Akhir, Infografis, dll) kepada pihak Kantor Pertanahan."
                ],
                completed: false
            }
        ];

        // Global State
        const year = 2026;
        let currentMonth = 3; // Start at April (Index 3)
        let activeTaskId = null;

        const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        // Init App
        document.addEventListener('DOMContentLoaded', () => {
            renderCalendar();
            updateGlobalProgress();
            
            // Check window size on load to handle empty state logic correctly
            if(window.innerWidth < 1024) {
                document.getElementById('empty-state').classList.add('hidden');
            }
        });

        // Controls
        function changeMonth(dir) {
            currentMonth += dir;
            // Restrict from April (3) to August (7)
            if (currentMonth < 3) currentMonth = 3;
            if (currentMonth > 7) currentMonth = 7;
            renderCalendar();
        }

        // Render Calendar Grid
        function renderCalendar() {
            // Update Headers & Buttons
            document.getElementById('month-year-display').innerText = `${monthNames[currentMonth]} ${year}`;
            document.getElementById('btn-prev').disabled = currentMonth === 3;
            document.getElementById('btn-next').disabled = currentMonth === 7;

            const grid = document.getElementById('calendar-body');
            grid.innerHTML = ''; // Clear

            const firstDay = new Date(year, currentMonth, 1).getDay(); // 0 (Sun) to 6 (Sat)
            const daysInMonth = new Date(year, currentMonth + 1, 0).getDate();

            // Render empty slots for padding
            for (let i = 0; i < firstDay; i++) {
                const cell = document.createElement('div');
                cell.className = "bg-white/30 border border-transparent rounded-lg";
                grid.appendChild(cell);
            }

            // Render actual days
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                cell.className = "calendar-cell bg-white border border-slate-100 rounded-lg p-1 sm:p-1.5 flex flex-col relative overflow-hidden min-h-[60px] sm:min-h-[80px]";
                
                // Day number
                const dayNum = document.createElement('span');
                // Weekend coloring
                const currentDayOfWeek = new Date(year, currentMonth, day).getDay();
                dayNum.className = `text-[10px] sm:text-xs font-semibold mb-1 ${currentDayOfWeek === 0 ? 'text-rose-500' : 'text-slate-500'}`;
                dayNum.innerText = day;
                cell.appendChild(dayNum);

                // Find task for this day
                const task = tasks.find(t => t.month === currentMonth && day >= t.start && day <= t.end);

                if (task) {
                    const pill = document.createElement('div');
                    
                    // Determine appearance based on state
                    let classes = `task-pill w-full flex-1 rounded border-l-[3px] p-0.5 sm:p-1 flex items-center cursor-pointer hover:brightness-95 ${task.theme.bg} ${task.theme.border} ${task.theme.text}`;
                    
                    if (task.completed) {
                        classes += " completed";
                    }

                    // Highlight if currently selected
                    if (activeTaskId === task.id) {
                        classes += " ring-2 ring-offset-1 ring-brand-500 shadow-md";
                        cell.classList.add("bg-slate-50");
                    }

                    pill.className = classes;
                    pill.onclick = () => selectTask(task.id);

                    // Only show text on the first day of the task, or the first day of the month
                    if (day === task.start || day === 1) {
                        pill.innerHTML = `
                            ${task.completed ? '<i class="fa-solid fa-check mr-1 text-[8px] sm:text-[10px]"></i>' : ''}
                            <span class="text-[8px] sm:text-[10px] md:text-xs font-bold leading-tight truncate w-full ${task.completed ? 'line-through' : ''}">${task.title}</span>
                        `;
                    } else {
                        // Continuation visual (blank pill)
                        pill.innerHTML = task.completed ? '<i class="fa-solid fa-check mx-auto text-[8px] sm:text-[10px] opacity-50"></i>' : '';
                    }

                    cell.appendChild(pill);
                }

                grid.appendChild(cell);
            }
        }

        // Handle Task Selection
        function selectTask(taskId) {
            activeTaskId = taskId;
            const task = tasks.find(t => t.id === taskId);
            
            // Re-render to highlight selected
            renderCalendar();

            // Handle Views
            document.getElementById('empty-state').classList.add('hidden');
            const detailView = document.getElementById('task-detail');
            detailView.classList.remove('hidden');
            
            // Trigger Mobile Modal Slide-up & Backdrop if on Mobile
            if(window.innerWidth < 1024) {
                const sidebar = document.getElementById('task-sidebar');
                const backdrop = document.getElementById('mobile-backdrop');
                
                sidebar.classList.remove('translate-y-full');
                backdrop.classList.remove('hidden');
                // Small delay to allow CSS transition
                setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
            }

            // Trigger animation trick
            detailView.classList.remove('animate-pop');
            void detailView.offsetWidth; // trigger reflow
            detailView.classList.add('animate-pop');

            // Populate Sidebar
            document.getElementById('detail-badge').className = `inline-flex items-center gap-2 px-3 py-1 rounded-full text-[10px] sm:text-xs font-bold mb-3 sm:mb-4 ${task.theme.badge}`;
            document.getElementById('detail-badge').innerHTML = `<i class="fa-solid fa-layer-group"></i> Tahap: ${task.category}`;
            
            document.getElementById('detail-title').innerText = task.title;
            
            const dateStr = task.start === task.end 
                ? `${task.start} ${monthNames[task.month]} ${year}`
                : `${task.start} - ${task.end} ${monthNames[task.month]} ${year}`;
            document.getElementById('detail-date').innerText = dateStr;

            // Populate Checklists
            const listEl = document.getElementById('detail-list');
            listEl.innerHTML = '';
            task.details.forEach(detail => {
                const li = document.createElement('li');
                li.className = "flex gap-3 items-start";
                li.innerHTML = `
                    <i class="fa-solid ${task.completed ? 'fa-check-circle text-brand-500' : 'fa-circle-dot text-slate-300'} mt-1 transition-colors"></i>
                    <span class="${task.completed ? 'text-slate-400 line-through' : ''}">${detail}</span>
                `;
                listEl.appendChild(li);
            });

            // Populate Action Button
            const btn = document.getElementById('btn-complete');
            if (task.completed) {
                btn.className = "w-full py-3.5 sm:py-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all shadow-sm bg-slate-100 text-slate-500 hover:bg-slate-200";
                btn.innerHTML = `<i class="fa-solid fa-rotate-left"></i> Batalkan Selesai`;
            } else {
                btn.className = "w-full py-3.5 sm:py-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all shadow-sm bg-brand-600 text-white hover:bg-brand-700 shadow-brand-500/30 hover:shadow-lg";
                btn.innerHTML = `<i class="fa-solid fa-check"></i> Tandai Telah Selesai`;
            }
        }

        // Close Mobile Modal
        function closeMobileModal() {
            const sidebar = document.getElementById('task-sidebar');
            const backdrop = document.getElementById('mobile-backdrop');
            
            // Slide down
            sidebar.classList.add('translate-y-full');
            // Fade out backdrop
            backdrop.classList.add('opacity-0');
            setTimeout(() => backdrop.classList.add('hidden'), 300);
            
            // Optional: deselect task to clear calendar highlight
            // activeTaskId = null;
            // renderCalendar();
        }

        // Handle Complete Action
        function toggleCurrentTask() {
            if(!activeTaskId) return;
            const task = tasks.find(t => t.id === activeTaskId);
            task.completed = !task.completed;
            
            selectTask(activeTaskId); // Refresh sidebar
            updateGlobalProgress();
        }

        // Calculate and Update Progress
        function updateGlobalProgress() {
            const completedCount = tasks.filter(t => t.completed).length;
            const totalCount = tasks.length;
            const percentage = Math.round((completedCount / totalCount) * 100);

            document.getElementById('progress-text').innerText = `${percentage}% (${completedCount}/${totalCount})`;
            document.getElementById('progress-bar').style.width = `${percentage}%`;

            const trophy = document.getElementById('trophy-icon');
            if (percentage === 100) {
                trophy.className = "fa-solid fa-trophy text-amber-400 text-xl animate-bounce drop-shadow-md";
                setTimeout(() => alert("🎉 Luar Biasa! Anda telah menyelesaikan seluruh rangkaian jadwal Fieldstaff 2026."), 500);
            } else if (percentage > 0) {
                trophy.className = "fa-solid fa-trophy text-brand-500 text-lg transition-colors duration-500";
            } else {
                trophy.className = "fa-solid fa-trophy text-slate-300 text-lg transition-colors duration-500";
            }
        }
    </script>
</body>
</html>
